name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ios-test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Prepare Secrets.xcconfig
        # 実値ファイルは .gitignore 済み（コミット禁止）。CI ではテンプレートを複製する。
        # ユニットテストのビルドに実値は不要。
        run: cp NewsListenApp/Secrets.example.xcconfig NewsListenApp/Secrets.xcconfig

      - name: Run tests
        run: |
          set -o pipefail
          # ランナーで利用可能な最初の iPhone シミュレータを動的に選択（イメージ更新で
          # デバイス名が変わっても壊れないようにする）
          DEVICE=$(xcrun simctl list devices available | grep -oE 'iPhone [0-9]+( Pro( Max)?)?' | head -1)
          if [ -z "${DEVICE}" ]; then
            echo "::error::No available iPhone simulator found on runner"
            xcrun simctl list devices available
            exit 1
          fi
          echo "Selected simulator: ${DEVICE}"
          xcodebuild test \
            -project NewsListenApp/NewsListenApp.xcodeproj \
            -scheme NewsListenApp \
            -destination "platform=iOS Simulator,name=${DEVICE}" \
            -only-testing:NewsListenAppTests \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
