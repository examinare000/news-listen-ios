name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ios-test:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: List available simulators
        run: xcrun simctl list devices available

      - name: Run tests
        run: |
          xcodebuild test \
            -project NewsListenApp/NewsListenApp.xcodeproj \
            -scheme NewsListenApp \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -only-testing:NewsListenAppTests \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        run: |
          if command -v gitleaks >/dev/null 2>&1; then
            gitleaks detect --redact --no-banner --source .
          else
            echo "gitleaks not found, installing..."
            wget -q -O /tmp/gitleaks https://github.com/gitleaks/gitleaks/releases/download/v8.18.0/gitleaks-linux-x64
            chmod +x /tmp/gitleaks
            /tmp/gitleaks detect --redact --no-banner --source .
          fi
